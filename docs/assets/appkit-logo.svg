<svg xmlns="http://www.w3.org/2000/svg" width="168" height="40" viewBox="0 0 168 40" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">appkit</title>
  <desc id="desc">An open kit box with a spark rising from it beside the appkit wordmark.</desc>
  <style>
    .draw {
      stroke-dasharray: 1;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 700ms cubic-bezier(.16,1,.3,1);
    }
    .spark { transition-delay: 220ms; }
    .word {
      fill: #0f172a;
      opacity: 1;
      transform: none;
      transition: opacity 420ms cubic-bezier(.16,1,.3,1) 520ms, transform 420ms cubic-bezier(.16,1,.3,1) 520ms;
    }
    @starting-style {
      .draw { stroke-dashoffset: 1; }
      .word { opacity: 0; transform: translateY(2px); }
    }
    @media (prefers-color-scheme: dark) { .word { fill: #f8fafc; } }
    @media (prefers-reduced-motion: reduce) {
      .draw, .word { transition: none; }
    }
  </style>
  <g transform="translate(3 4)" stroke="#0d9488" stroke-linecap="round" stroke-linejoin="round">
    <path class="draw" d="M6 13v11a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V13" stroke-width="2.4" pathLength="1"/>
    <path class="draw spark" d="M17.5 4 12 15h4.4l-1.9 7.5L20.5 12h-4.6l1.6-8Z" stroke-width="2" pathLength="1"/>
  </g>
  <text class="word" x="43" y="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="650" letter-spacing="-0.8">app<tspan fill="#0d9488">kit</tspan></text>
</svg>
